<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>QR Scanner</title>
    <style>
      html,body { height:100%; margin:0; }
      #reader { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#111; }
      .message { position:absolute; bottom:8px; left:8px; color:#eee; font-family:sans-serif; }
    </style>
  </head>
  <body>
    <div id="reader"></div>
    <div class="message">Escaneá el QR</div>

    <script>
      (function(){
        const containerId = 'reader';
        let scanner = null;
        let running = false;


        function start() {
          try {
            if (typeof Html5Qrcode === 'undefined') {
              throw new Error('Html5Qrcode is not available');
            }
            scanner = new Html5Qrcode(containerId);
            scanner.start(
              { facingMode: 'environment' },
              { fps: 10, qrbox: { width: 250, height: 250 } },
              (decodedText) => {
                try { parent.postMessage({ type: 'qr-scan', data: decodedText }, '*'); } catch (e) {}
              },
              (err) => {},
            ).then(() => {
              running = true;
            }).catch((e) => {
              log('start failed', e);
              parent.postMessage({ type: 'qr-error', error: String(e) }, '*');
            });
          } catch (e) {
            log('start exception', e);
            parent.postMessage({ type: 'qr-error', error: String(e) }, '*');
          }
        }

        function stopAndClear() {
          try {
            if (!scanner) return Promise.resolve();
            return scanner.stop().then(() => {
              try { scanner.clear(); } catch (e) {}
              running = false;
              try { parent.postMessage({ type: 'stopped' }, '*'); } catch (e) {}
            }).catch((e) => {
              log('stop failed', e);
              try { parent.postMessage({ type: 'stopped', error: String(e) }, '*'); } catch (e) {}
            });
          } catch (e) {
            log('stopAndClear exception', e);
            try { parent.postMessage({ type: 'stopped', error: String(e) }, '*'); } catch (e) {}
            return Promise.resolve();
          }
        }

        window.addEventListener('message', (ev) => {
          try {
            const data = ev.data || {};
            if (data && data.type === 'stop') {
              stopAndClear();
            }
            if (data && data.type === 'start') {
              start();
            }
          } catch (e) {}
        }, false);

        // dynamically load the html5-qrcode script and start after load
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
        script.async = true;
        script.onload = () => {
          try { start(); } catch (e) { log('start onload failed', e); }
        };
        script.onerror = (e) => {
          try { parent.postMessage({ type: 'qr-error', error: 'Failed loading html5-qrcode library' }, '*'); } catch (err) {}
        };
        document.head.appendChild(script);

        // ensure cleanup when iframe is unloaded
        window.addEventListener('beforeunload', () => {
          try { if (running && scanner) { scanner.stop(); } } catch (e) {}
        });
      })();
    </script>
  </body>
</html>
